<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修改密码</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <main class="narrow-page">
    <a href="/group" class="link-button">返回后台</a>
    <h1>修改密码</h1>
    <form id="passwordForm" class="panel stack">
      <label>原密码<input name="old_password" type="password" required></label>
      <label>新密码<input name="new_password" type="password" minlength="8" required></label>
      <label>确认新密码<input name="confirm_password" type="password" minlength="8" required></label>
      <button class="primary" type="submit">保存</button>
      <p id="msg" class="msg"></p>
    </form>
  </main>
  <script>
    let csrf = '';
    fetch('/admin/csrf').then(r => r.json()).then(j => csrf = j.csrf || '');
    document.getElementById('passwordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const res = await fetch('/admin/doChangePassword', {
        method: 'POST',
        headers: { 'X-CSRF-Token': csrf },
        body: new FormData(event.currentTarget)
      });
      const data = await res.json();
      document.getElementById('msg').textContent = data.msg || '';
      if (data.code === 1) setTimeout(() => location.href = '/admin/login', 800);
    });
  </script>
</body>
</html>
