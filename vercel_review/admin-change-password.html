<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>修改密码</title>
  <link rel="stylesheet" href="/assets/review.css">
</head>
<body class="simple-shell">
  <main class="panel narrow">
    <a class="ghost-link" href="/group">返回后台</a>
    <h1>修改密码</h1>
    <form id="passwordForm" class="stack">
      <label>原密码<input name="old_password" type="password" required></label>
      <label>新密码<input name="new_password" type="password" minlength="8" required></label>
      <label>确认新密码<input name="confirm_password" type="password" minlength="8" required></label>
      <button type="submit" class="primary">保存</button>
      <p id="msg" class="muted"></p>
    </form>
  </main>
  <script src="/assets/review-data.js"></script>
  <script>
    window.ReviewData.ensureSeed();
    if (!window.ReviewData.requireSession()) location.href = "/admin/login";
    document.getElementById("passwordForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const result = window.ReviewData.changeOwnPassword(
        String(form.get("old_password") || ""),
        String(form.get("new_password") || ""),
        String(form.get("confirm_password") || "")
      );
      document.getElementById("msg").textContent = result.message;
      if (result.ok) {
        setTimeout(() => location.href = "/admin/login", 600);
      }
    });
  </script>
</body>
</html>
